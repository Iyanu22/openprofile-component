services:
  db:
    image: postgres:16-alpine
    container_name: openprofile-db
    environment:
      POSTGRES_USER: openprofile
      POSTGRES_PASSWORD: openprofile
      POSTGRES_DB: openprofile
    ports:
      - "5432:5432"
    volumes:
      - openprofile_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openprofile -d openprofile"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  openprofile_pgdata:
